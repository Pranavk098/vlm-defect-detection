# Training config for a local 8 GB VRAM GPU (e.g. RTX 3070/4060/5070).
# For WandB logging, change report_to to "wandb" or pass it as a CLI override:
#   python scripts/train.py configs/local_8gb.yaml training.report_to=wandb
# You can also set it here permanently once you have run: wandb login

model:
  name_or_path: "liuhaotian/llava-v1.5-7b"
  version: "v1"
  vision_tower: "openai/clip-vit-large-patch14-336"
  mm_projector_type: "mlp2x_gelu"
  mm_vision_select_layer: -2
  mm_use_im_start_end: false
  mm_use_im_patch_token: false
  image_aspect_ratio: "pad"

quantization:
  bits: 4
  double_quant: true
  quant_type: "nf4"

lora:
  enable: true
  r: 128
  alpha: 256
  dropout: 0.05

data:
  # Generated by: make prepare   (runs scripts/prepare_data.py)
  path: "data/mvtec_train.json"
  image_folder: "mvtec_anomaly_detection"

training:
  output_dir: "checkpoints/llava-mvtec-lora"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4   # effective batch = 4 * 4 = 16
  bf16: true
  tf32: true
  evaluation_strategy: "no"
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 2
  learning_rate: 2.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 1
  model_max_length: 2048
  gradient_checkpointing: true
  dataloader_num_workers: 4
  lazy_preprocess: true
  group_by_modality_length: true
  report_to: "none"   # change to "wandb" to enable WandB logging
