# Training config for a local 8 GB VRAM GPU (e.g. RTX 3070/4060/5070).
#
# LlavaForConditionalGeneration is built into HuggingFace transformers >= 4.36.
# No external LLaVA repo clone is needed — all model weights are fetched from
# the HuggingFace Hub: https://huggingface.co/llava-hf/llava-1.5-7b-hf
#
# ── v3 improvements over v2 ─────────────────────────────────────────────────
#
# Diagnosis from v2 (threshold=0.70):
#   TP=379  FP=1  TN=466  FN=269  →  Precision=0.997, Recall=0.585, F1=0.737
#   Root cause: no_token_weight=2.7 made the model over-predict "No", causing
#   269 false negatives.  Optimal inference threshold was 0.30 (F1=0.828),
#   not the default 0.70.  Worst categories: transistor(0.095), screw(0.123),
#   capsule(0.250), pill(0.554).
#
# v3 changes:
#   1. Removed no_token_weight (was hurting recall) — replaced with
#      yes_token_weight=2.0 to upweight "Yes" response tokens instead.
#   2. LoRA target_modules expanded to include MLP layers (gate_proj, up_proj,
#      down_proj) — more trainable parameters for richer visual reasoning.
#   3. category_weights: added screw(4×), capsule(3×), pill(2.5×) — all had
#      F1 < 0.30 in v2 and need more gradient signal.
#   4. anomaly_train_fraction: 0.50 → 0.65 — more defect examples in training
#      for hard categories.
#   5. metric_for_best_model: eval_loss → f1 — selects checkpoints by the
#      metric we actually care about at inference time.
#   6. output_dir: llava-mvtec-lora-v3 (fresh run, do not overwrite v2).
#   7. Inference: default threshold lowered to 0.30 in evaluate.py.
#      Category-specific thresholds: transistor/screw=0.10, capsule=0.20, pill=0.25.
#
# ────────────────────────────────────────────────────────────────────────────
#
# For WandB logging, change report_to to "wandb" or pass it as a CLI override:
#   vlm-train configs/local_8gb.yaml training.report_to=wandb

model:
  name_or_path: "llava-hf/llava-1.5-7b-hf"   # HF Hub — no clone required

quantization:
  bits: 4
  double_quant: true
  quant_type: "nf4"

lora:
  enable: true
  r: 16             # rank — more adapter capacity than v1's r=8
  alpha: 32         # 2 × r
  dropout: 0.05
  target_modules:   # v3: expanded to full attention + MLP for richer visual reasoning
    - q_proj        # query projection (attention)
    - v_proj        # value projection (attention)
    - k_proj        # key projection (attention)
    - o_proj        # output projection (attention)
    - gate_proj     # MLP gate — NEW in v3
    - up_proj       # MLP up-projection — NEW in v3
    - down_proj     # MLP down-projection — NEW in v3

data:
  # Generated by: make prepare   (runs scripts/prepare_data.py)
  path: "data/mvtec_train.json"
  image_folder: "mvtec_anomaly_detection"
  val_fraction: 0.1        # 10% held-out validation split
  # v3: raised from 0.50 → 0.65 — more anomaly examples in training,
  # especially benefits the hard categories (screw, capsule, transistor).
  anomaly_train_fraction: 0.65

# ── Class balancing ───────────────────────────────────────────────────────────
# v2 used no_token_weight=2.7 which caused the model to over-predict "No"
# (FN=269, FP=1).  v3 flips the strategy: upweight "Yes" response tokens
# so the model is penalised more for missing real defects.
# Set yes_token_weight=1.0 (or remove this section) to disable weighting.
class_balance:
  no_token_weight: 1.0    # DISABLED — was hurting recall in v2
  yes_token_weight: 2.0   # NEW: upweight "Yes" tokens to improve recall

# ── Category-level oversampling ───────────────────────────────────────────────
# v2 only oversampled cable(2×) and transistor(2×).
# v3 adds the remaining low-F1 categories identified post v2 eval:
#   transistor F1=0.095, screw F1=0.123, capsule F1=0.250, pill F1=0.554
category_weights:
  transistor: 4.0   # v2=2.0 → v3=4.0 (F1=0.095, near-total failure)
  screw:      4.0   # NEW (F1=0.123, near-total failure)
  capsule:    3.0   # NEW (F1=0.250, severe underperformance)
  pill:       2.5   # NEW (F1=0.554, moderate underperformance)
  cable:      2.0   # keep from v2 (F1=0.676)

training:
  output_dir: "checkpoints/llava-mvtec-lora-v3"   # fresh dir — do not overwrite v2
  num_train_epochs: 5
  per_device_train_batch_size: 1       # keep at 1 to fit 8 GB VRAM
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16      # effective batch = 16
  bf16: true
  tf32: true
  evaluation_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  # v3: switched from eval_loss → f1 so we select the checkpoint that
  # maximises the metric we actually care about at inference time.
  metric_for_best_model: "f1"
  greater_is_better: true
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  logging_steps: 1
  model_max_length: 2048
  gradient_checkpointing: true
  dataloader_num_workers: 4
  report_to: "wandb"   # change to "wandb" or pass training.report_to=wandb
