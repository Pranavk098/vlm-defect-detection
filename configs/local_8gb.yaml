# Training config for a local 8 GB VRAM GPU (e.g. RTX 3070/4060/5070).
#
# LlavaForConditionalGeneration is built into HuggingFace transformers >= 4.36.
# No external LLaVA repo clone is needed — all model weights are fetched from
# the HuggingFace Hub: https://huggingface.co/llava-hf/llava-1.5-7b-hf
#
# For WandB logging, change report_to to "wandb" or pass it as a CLI override:
#   vlm-train configs/local_8gb.yaml training.report_to=wandb
# You can also set it here permanently once you have run: wandb login

model:
  name_or_path: "llava-hf/llava-1.5-7b-hf"   # HF Hub — no clone required

quantization:
  bits: 4
  double_quant: true
  quant_type: "nf4"

lora:
  enable: true
  r: 8            # rank 128 → 8: 16x fewer adapter params, fits 8 GB VRAM
  alpha: 16       # keep alpha = 2 × r
  dropout: 0.05
  target_modules: ["q_proj", "v_proj"]

data:
  # Generated by: make prepare   (runs scripts/prepare_data.py)
  path: "data/mvtec_train.json"
  image_folder: "mvtec_anomaly_detection"
  val_fraction: 0.1   # 10% held-out validation split

training:
  output_dir: "checkpoints/llava-mvtec-lora"
  num_train_epochs: 3
  per_device_train_batch_size: 1    # batch 4 → 1 to fit 8 GB VRAM
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16   # effective batch = 1 × 16 = 16 (unchanged)
  bf16: true
  tf32: true
  evaluation_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  learning_rate: 2.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 1
  model_max_length: 2048
  gradient_checkpointing: true
  dataloader_num_workers: 4
  report_to: "none"   # change to "wandb" to enable WandB logging
